<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="View medicine information including composition, uses, warnings, side effects and manufacturer details."
    >

    <title>Medicine Details | Medvika Healthcare Solutions</title>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

    <style>
        :root {
            --primary: #0866c6;
            --primary-dark: #064c95;
            --secondary: #0f9f78;
            --background: #f4f8fc;
            --surface: #ffffff;
            --text: #172033;
            --muted: #667085;
            --border: #dbe4ef;
            --warning-bg: #fff8e6;
            --shadow: 0 12px 35px rgba(15, 35, 65, 0.09);
            --radius: 18px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Inter", Arial, sans-serif;
            color: var(--text);
            background: var(--background);
            line-height: 1.7;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .site-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.96);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
        }

        .header-inner {
            width: min(1180px, calc(100% - 32px));
            min-height: 76px;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand img {
            width: 54px;
            height: 54px;
            object-fit: contain;
        }

        .brand-text strong {
            display: block;
            color: var(--primary-dark);
            font-size: 17px;
        }

        .brand-text span {
            display: block;
            color: var(--muted);
            font-size: 12px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 44px;
            padding: 10px 17px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: white;
            color: var(--primary-dark);
            font-weight: 700;
        }

        .container {
            width: min(1050px, calc(100% - 32px));
            margin: auto;
        }

        .page-section {
            padding: 55px 0 75px;
        }

        .medicine-header {
            padding: 28px;
            border: 1px solid var(--border);
            border-radius: 22px;
            background: white;
            box-shadow: var(--shadow);
        }

        .medicine-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 20px;
        }

        .medicine-title {
            margin: 0;
            color: #10213a;
            font-size: clamp(30px, 6vw, 48px);
            line-height: 1.12;
        }

        .generic-name {
            margin: 10px 0 0;
            color: var(--primary);
            font-size: 18px;
            font-weight: 700;
        }

        .verified-badge {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 11px;
            border-radius: 999px;
            background: #e8f8f2;
            color: #087b5d;
            font-size: 12px;
            font-weight: 800;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
            margin-top: 24px;
        }

        .summary-item {
            padding: 15px;
            border-radius: 13px;
            background: #f7f9fc;
        }

        .summary-item span {
            display: block;
            margin-bottom: 4px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .summary-item strong {
            display: block;
            color: #27364e;
            overflow-wrap: anywhere;
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin-top: 22px;
        }

        .detail-card {
            padding: 22px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: white;
            box-shadow: 0 8px 24px rgba(23, 32, 51, 0.05);
        }

        .detail-card.full {
            grid-column: 1 / -1;
        }

        .detail-card h2 {
            margin: 0 0 10px;
            color: #10213a;
            font-size: 20px;
        }

        .detail-card p {
            margin: 0;
            color: #475467;
            white-space: pre-line;
        }

        .state-card {
            padding: 45px 20px;
            border: 1px dashed #c8d4e3;
            border-radius: var(--radius);
            background: rgba(255, 255, 255, 0.72);
            color: var(--muted);
            text-align: center;
        }

        .state-card i {
            display: block;
            margin-bottom: 12px;
            color: var(--primary);
            font-size: 35px;
        }

        .loading-spinner {
            width: 38px;
            height: 38px;
            margin: 0 auto 15px;
            border: 4px solid #dfe9f4;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .disclaimer {
            margin-top: 22px;
            padding: 18px;
            border: 1px solid #f1dfaa;
            border-radius: 14px;
            background: var(--warning-bg);
            color: #745b17;
            font-size: 13px;
        }

        footer {
            padding: 25px 16px;
            border-top: 1px solid var(--border);
            background: white;
            color: var(--muted);
            text-align: center;
            font-size: 13px;
        }

        @media (max-width: 760px) {
            .summary-grid,
            .details-grid {
                grid-template-columns: 1fr;
            }

            .detail-card.full {
                grid-column: auto;
            }

            .medicine-top {
                flex-direction: column;
            }
        }

        @media (max-width: 560px) {
            .brand-text span {
                display: none;
            }

            .back-link span {
                display: none;
            }

            .medicine-header {
                padding: 20px;
            }
        }
   
   .related-section {
    margin-top: 24px;
    padding: 26px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    box-shadow: 0 8px 24px rgba(23, 32, 51, 0.05);
}

.related-heading {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 18px;
}

.related-heading h2 {
    margin: 4px 0 6px;
    color: #10213a;
    font-size: 25px;
}

.related-heading p {
    margin: 0;
    color: var(--muted);
    font-size: 14px;
}

.section-label {
    color: var(--secondary);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
}

.related-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 14px;
}

.related-card {
    display: flex;
    flex-direction: column;
    padding: 18px;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: #f8fafc;
}

.related-card h3 {
    margin: 0 0 6px;
    color: #10213a;
    font-size: 17px;
}

.related-card .related-generic {
    margin: 0 0 12px;
    color: var(--primary);
    font-size: 13px;
    font-weight: 700;
}

.related-meta {
    display: grid;
    gap: 7px;
    margin-bottom: 16px;
    color: var(--muted);
    font-size: 13px;
}

.related-meta strong {
    color: #344054;
}

.related-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    min-height: 42px;
    margin-top: auto;
    padding: 9px 13px;
    border-radius: 10px;
    background: var(--primary);
    color: white;
    font-size: 13px;
    font-weight: 700;
}

.related-link:hover {
    background: var(--primary-dark);
}

@media (max-width: 850px) {
    .related-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
    }
}

@media (max-width: 560px) {
    .related-section {
        padding: 20px;
    }

    .related-grid {
        grid-template-columns: 1fr;
    }
} 
    </style>
</head>

<body>

<header class="site-header">
    <div class="header-inner">

        <a href="/" class="brand">
            <img src="../logo.png" alt="Medvika Healthcare Solutions logo">

            <div class="brand-text">
                <strong>Medvika Healthcare</strong>
                <span>Healthcare & Pharmacy Consulting</span>
            </div>
        </a>

        <a href="./" class="back-link">
            <i class="fa-solid fa-arrow-left"></i>
            <span>Back to Medicine Search</span>
        </a>

    </div>
</header>

<main class="page-section">
    <div class="container">
        <div id="medicineContent">

            <div class="state-card">
                <div class="loading-spinner"></div>
                Loading medicine information...
            </div>

        </div>
    </div>
</main>

<footer>
    © 2026 Medvika Healthcare Solutions. All rights reserved.
</footer>

<script type="module">
    import {
        createClient
    } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL =
        "https://etevzodzxhsdwidtrmwv.supabase.co";

    const SUPABASE_KEY =
        "sb_publishable_iKWBOAxrWTZfU6Qb5PYd5Q_0y80GEOw";

    const supabase = createClient(
        SUPABASE_URL,
        SUPABASE_KEY
    );

    const medicineContent =
        document.getElementById("medicineContent");
   
    const relatedSection =
    document.getElementById("relatedSection");

const relatedMedicines =
    document.getElementById("relatedMedicines");

    const genericSection =
    document.getElementById("genericSection");

const genericAlternatives =
    document.getElementById("genericAlternatives");
    function escapeHtml(value) {
        const element = document.createElement("div");
        element.textContent = value ?? "";
        return element.innerHTML;
    }

    function displayValue(value) {
        return value
            ? escapeHtml(value)
            : "Information not available";
    }

    function showError(message) {
        medicineContent.innerHTML = `
            <div class="state-card">
                <i class="fa-solid fa-triangle-exclamation"></i>
                ${escapeHtml(message)}
            </div>
        `;
    }

    function createDetailCard(title, value, full = false) {
        if (!value) {
            return "";
        }

        return `
            <section class="detail-card ${full ? "full" : ""}">
                <h2>${escapeHtml(title)}</h2>
                <p>${escapeHtml(value)}</p>
            </section>
        `;
    }

   async function loadRelatedMedicines(currentMedicine) {
    relatedSection.hidden = true;
    relatedMedicines.innerHTML = "";

    const genericName =
        currentMedicine.generic_name?.trim() || "";

    if (!genericName) {
        return;
    }

    const { data, error } = await supabase
        .from("medicines")
        .select(`
            brand_name,
            slug,
            generic_name,
            composition,
            strength,
            dosage_form,
            therapeutic_class,
            is_verified
        `)
        .eq("is_active", true)
        .ilike("generic_name", genericName)
        .neq("slug", currentMedicine.slug)
        .limit(6);

    if (error) {
        console.error("Related medicines error:", error);
        return;
    }

    if (!data || data.length === 0) {
        return;
    }

    relatedMedicines.innerHTML = data.map(item => `
        <article class="related-card">

            <h3>
                ${escapeHtml(
                    item.brand_name || "Unnamed medicine"
                )}
            </h3>

            <p class="related-generic">
                ${escapeHtml(
                    item.generic_name ||
                    "Generic name not available"
                )}
            </p>

            <div class="related-meta">
                <div>
                    <strong>Composition:</strong>
                    ${escapeHtml(
                        item.composition ||
                        "Not available"
                    )}
                </div>

                <div>
                    <strong>Strength:</strong>
                    ${escapeHtml(
                        item.strength ||
                        "Not available"
                    )}
                </div>

                <div>
                    <strong>Form:</strong>
                    ${escapeHtml(
                        item.dosage_form ||
                        "Not available"
                    )}
                </div>
            </div>

            <a
                class="related-link"
                href="details.html?slug=${encodeURIComponent(item.slug)}"
            >
                View Details
                <i class="fa-solid fa-arrow-right"></i>
            </a>

        </article>
    `).join("");

    relatedSection.hidden = false;
   }
       async function loadMedicine() {
        const params = new URLSearchParams(window.location.search);
        const slug = params.get("slug");

        if (!slug) {
            showError("No medicine was selected.");
            return;
        }

        const { data, error } = await supabase
            .from("medicines")
            .select(`
                *,
                manufacturers(name),
                categories(name)
            `)
            .eq("slug", slug)
            .eq("is_active", true)
            .maybeSingle();

        if (error) {
            console.error("Medicine details error:", error);

            showError(
                "Medicine information could not be loaded."
            );

            return;
        }

        if (!data) {
            showError("Medicine record was not found.");
            return;
        }

        document.title =
            `${data.brand_name} | Medvika Medicine Information`;

        medicineContent.innerHTML = `
         <article class="medicine-header">

                <div class="medicine-top">
                    <div>
                        <h1 class="medicine-title">
                            ${displayValue(data.brand_name)}
                        </h1>

                        <p class="generic-name">
                            ${displayValue(data.generic_name)}
                        </p>
                    </div>

                    ${data.is_verified ? `
                        <span class="verified-badge">
                            <i class="fa-solid fa-circle-check"></i>
                            Verified
                        </span>
                    ` : ""}
                </div>

                <div class="summary-grid">

                    <div class="summary-item">
                        <span>Composition</span>
                        <strong>
                            ${displayValue(data.composition)}
                        </strong>
                    </div>

                    <div class="summary-item">
                        <span>Strength</span>
                        <strong>
                            ${displayValue(data.strength)}
                        </strong>
                    </div>

                    <div class="summary-item">
                        <span>Dosage form</span>
                        <strong>
                            ${displayValue(data.dosage_form)}
                        </strong>
                    </div>

                    <div class="summary-item">
                        <span>Manufacturer</span>
                        <strong>
                            ${displayValue(
                                data.manufacturers?.name
                            )}
                        </strong>
                    </div>

                    <div class="summary-item">
                        <span>Pack size</span>
                        <strong>
                            ${displayValue(data.pack_size)}
                        </strong>
                    </div>

                    <div class="summary-item">
                        <span>Prescription status</span>
                        <strong>
                            ${displayValue(
                                data.prescription_status
                            )}
                        </strong>
                    </div>

                </div>
            </article>

            <div class="details-grid">

                ${createDetailCard(
                    "Description",
                    data.description,
                    true
                )}

                ${createDetailCard(
                    "Uses",
                    data.uses
                )}

                ${createDetailCard(
                    "How it works",
                    data.how_it_works
                )}

                ${createDetailCard(
                    "Directions for use",
                    data.directions_for_use,
                    true
                )}

                ${createDetailCard(
                    "Common side effects",
                    data.common_side_effects
                )}

                ${createDetailCard(
                    "Serious side effects",
                    data.serious_side_effects
                )}

                ${createDetailCard(
                    "Precautions",
                    data.precautions
                )}

                ${createDetailCard(
                    "Contraindications",
                    data.contraindications
                )}

                ${createDetailCard(
                    "Pregnancy information",
                    data.pregnancy_information
                )}

                ${createDetailCard(
                    "Breastfeeding information",
                    data.breastfeeding_information
                )}

                ${createDetailCard(
                    "Alcohol warning",
                    data.alcohol_warning
                )}

                ${createDetailCard(
                    "Driving warning",
                    data.driving_warning
                )}

                ${createDetailCard(
                    "Kidney warning",
                    data.kidney_warning
                )}

                ${createDetailCard(
                    "Liver warning",
                    data.liver_warning
                )}

                ${createDetailCard(
                    "Missed dose information",
                    data.missed_dose_information
                )}

                ${createDetailCard(
                    "Overdose information",
                    data.overdose_information
                )}

                ${createDetailCard(
                    "Storage information",
                    data.storage_information,
                    true
                )}

            </div>

<section class="related-section" id="relatedSection" hidden>
    <div class="related-heading">
        <div>
            <span class="section-label">Explore More</span>
            <h2>Related Medicines</h2>
            <p>
                Medicines with the same generic ingredient or therapeutic class.
            </p>
        </div>
    </div>

    <div class="related-grid" id="relatedMedicines"></div>
</section>
           <section class="related-section" id="genericSection" hidden>

    <div class="related-heading">
        <span class="section-label">
            Save More
        </span>

        <h2>Generic Alternatives</h2>

        <p>
            Other brands containing the same generic medicine.
        </p>
    </div>

    <div
        class="related-grid"
        id="genericAlternatives">
    </div>

</section> 
            <div class="disclaimer">
                <strong>Medical disclaimer:</strong>
                ${displayValue(
                    data.medical_disclaimer ||
                    "This information is for general educational purposes only and does not replace professional medical advice. Always consult a registered medical practitioner or pharmacist before using any medicine."
                )}
            </div>
        `;
       await loadRelatedMedicines(data);
    }

    loadMedicine();
</script>

</body>
</html>
