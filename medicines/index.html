<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://etevzodzxhsdwidtrmw.supabase.co",
  "sb_publishable_iKWBOAxrWTZfU6Qb5PYd5Q_0y80GEOw"
);

const search = document.getElementById("search");
const results = document.getElementById("results");

function renderMessage(message, color = "red") {
  results.innerHTML = `<p style="color:${color};padding:10px">${message}</p>`;
}

search.addEventListener("input", async () => {
  const value = search.value.trim();

  if (value.length < 2) {
    results.innerHTML = "";
    return;
  }

  renderMessage("Searching...", "blue");

  try {
    const { data, error } = await supabase
      .from("medicines")
      .select("*")
      .or(`brand_name.ilike.%${value}%,generic_name.ilike.%${value}%`)
      .limit(10);

    if (error) {
      console.error(error);
      renderMessage(error.message);
      return;
    }

    if (!data || data.length === 0) {
      renderMessage("No medicine found", "orange");
      return;
    }

    results.innerHTML = "";

    data.forEach((item) => {
      results.innerHTML += `
        <div class="card">
          <h2>${item.brand_name || ""}</h2>
          <p><b>Generic:</b> ${item.generic_name || "-"}</p>
          <p><b>Strength:</b> ${item.strength || "-"}</p>
          <p><b>Manufacturer:</b> ${item.manufacturer || "-"}</p>
          <p><b>MRP:</b> ₹${item.mrp || "-"}</p>
        </div>
      `;
    });

  } catch (err) {
    console.error(err);
    renderMessage(err.message);
  }
});
</script>
