<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medicine Search | Medvika</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:0;
    background:#f5f5f5;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    color:#0d6efd;
}

#search{
    width:100%;
    padding:16px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:18px;
    box-sizing:border-box;
}

.card{
    background:white;
    margin-top:15px;
    padding:15px;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,.15);
}

.loading{
    text-align:center;
    color:#0d6efd;
    margin-top:20px;
}

.error{
    color:red;
    text-align:center;
    margin-top:20px;
}

.empty{
    color:#666;
    text-align:center;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>💊 Medicine Search</h1>

<input
id="search"
placeholder="Search medicine by Brand or Generic Name">

<div id="results"></div>

</div>

<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL="https://etevzodzxhsdwidtrmw.supabase.co";

const SUPABASE_KEY="sb_publishable_iKWBOAxrWTZfU6Qb5PYd5Q_0y80GEOw";

const supabase=createClient(SUPABASE_URL,SUPABASE_KEY);

const search=document.getElementById("search");

const results=document.getElementById("results");

function showLoading(){
results.innerHTML='<div class="loading">Searching...</div>';
}

function showError(msg){
results.innerHTML=`<div class="error">${msg}</div>`;
}

function showEmpty(){
results.innerHTML='<div class="empty">No medicines found.</div>';
}

search.addEventListener("input",async()=>{

const value=search.value.trim();

if(value.length<2){
results.innerHTML="";
return;
}

showLoading();

try{

const {data,error}=await supabase
.from("medicines")
.select("*")
.or(`brand_name.ilike.%${value}%,generic_name.ilike.%${value}%`)
.limit(20);

if(error){

console.error(error);

showError(error.message);

return;

}

if(!data || data.length===0){

showEmpty();

return;

}

results.innerHTML="";

data.forEach(item=>{

results.innerHTML+=`

<div class="card">

<h2>${item.brand_name ?? ""}</h2>

<p><b>Generic:</b> ${item.generic_name ?? "-"}</p>

<p><b>Strength:</b> ${item.strength ?? "-"}</p>

<p><b>Manufacturer:</b> ${item.manufacturer ?? "-"}</p>

<p><b>MRP:</b> ₹${item.mrp ?? "-"}</p>

</div>

`;

});

}

catch(err){

console.error(err);

showError(err.message);

}

});

</script>

</body>
</html>
