<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medicine Search | Medvika</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:0;
    background:#f5f5f5;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    color:#0d6efd;
}

#search{
    width:100%;
    padding:16px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:18px;
    box-sizing:border-box;
}

.card{
    background:white;
    margin-top:15px;
    padding:15px;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,.15);
}

.loading{
    text-align:center;
    color:#0d6efd;
    margin-top:20px;
}

.error{
    color:red;
    text-align:center;
    margin-top:20px;
}

.empty{
    color:#666;
    text-align:center;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>💊 Medicine Search</h1>

<input
id="search"
placeholder="Search medicine by Brand or Generic Name">

<div id="results"></div>

</div>
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL =
  "https://etevzodzxhsdwidtrmwv.supabase.co";

const SUPABASE_KEY =
  "sb_publishable_iKWBOAxrWTZfU6Qb5PYd5Q_0y80GEOw";

const supabase = createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

const search = document.getElementById("search");
const results = document.getElementById("results");

function showLoading() {
  results.innerHTML =
    '<div class="loading">Searching...</div>';
}

function showError(message) {
  results.innerHTML =
    `<div class="error">${message}</div>`;
}

function showEmpty() {
  results.innerHTML =
    '<div class="empty">No medicines found.</div>';
}

function escapeHtml(value) {
  const element = document.createElement("div");
  element.textContent = value ?? "";
  return element.innerHTML;
}

search.addEventListener("input", async () => {
  const value = search.value.trim();

  if (value.length < 2) {
    results.innerHTML = "";
    return;
  }

  showLoading();

  try {
    const { data, error } = await supabase
      .from("medicines")
      .select(`
        id,
        brand_name,
        generic_name,
        composition,
        strength,
        dosage_form,
        mrp
      `)
      .eq("is_active", true)
      .eq("is_verified", true)
      .or(
        `brand_name.ilike.%${value}%,generic_name.ilike.%${value}%,composition.ilike.%${value}%`
      )
      .order("brand_name")
      .limit(20);

    if (error) {
      console.error(error);
      showError(error.message);
      return;
    }

    if (!data || data.length === 0) {
      showEmpty();
      return;
    }

    results.innerHTML = data
      .map((item) => {
        const price =
          item.mrp !== null
            ? `₹${Number(item.mrp).toFixed(2)}`
            : "Not available";

        return `
          <div class="card">
            <h2>${escapeHtml(item.brand_name)}</h2>

            <p>
              <b>Generic:</b>
              ${escapeHtml(item.generic_name || "-")}
            </p>

            <p>
              <b>Composition:</b>
              ${escapeHtml(item.composition || "-")}
            </p>

            <p>
              <b>Strength:</b>
              ${escapeHtml(item.strength || "-")}
            </p>

            <p>
              <b>Dosage form:</b>
              ${escapeHtml(item.dosage_form || "-")}
            </p>

            <p>
              <b>MRP:</b>
              ${price}
            </p>
          </div>
        `;
      })
      .join("");
  } catch (error) {
    console.error(error);
    showError("Medicine search is temporarily unavailable.");
  }
});
</script>

</body>
</html>
